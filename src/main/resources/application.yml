server:
  port: ${PORT:8080}

spring:
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://${DATABASE_URL:localhost}:${DATABASE_PORT:5432}/onlineorder
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${INIT_DB:always}
      schema-locations: "classpath:database-init.sql"
  cache:
    caffeine:
      spec: expireAfterWrite=60s


logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: TRACE # Incoming HTTP requests
    org.springframework.jdbc.datasource.init: DEBUG
    org.springframework.jdbc.core: DEBUG # SQL

---
spring:
  config:
    activate:
      on-profile: gcp
  datasource:
    url: jdbc:postgresql:///${DATABASE_NAME:onlineorder}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlRefreshStrategy=lazy
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
  sql:
    init:
      mode: ${INIT_DB:never}

logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: INFO
    org.springframework.jdbc.datasource.init: INFO
    org.springframework.jdbc.core: INFO

---
spring:
  config:
    activate:
      on-profile: demo
  datasource:
    url: jdbc:h2:mem:onlineorder;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always

logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: INFO
    org.springframework.jdbc.datasource.init: INFO
    org.springframework.jdbc.core: INFO
